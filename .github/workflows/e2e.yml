name: E2E Cross-Browser

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install package dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install package dependencies
        run: npm ci

      - name: Install test-example-app dependencies
        working-directory: test-example-app
        run: npm install

      - name: Install mock service worker
        working-directory: test-example-app
        run: npx twd-js init public --save

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start dev server
        working-directory: test-example-app
        run: |
          nohup npx vite --host > vite.log 2>&1 &
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Run TWD tests across browsers (local CLI)
        working-directory: test-example-app
        run: node ../bin/twd-browsers.js run
